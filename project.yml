name: SkillLens
options:
  createIntermediateGroups: true
  developmentLanguage: zh-Hans
  deploymentTarget:
    macOS: "14.0"
settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    ENABLE_USER_SCRIPT_SANDBOXING: true
    MARKETING_VERSION: "1.1.0"
    CURRENT_PROJECT_VERSION: "2"
targets:
  SkillLens:
    type: application
    platform: macOS
    sources:
      - path: SkillLens
        excludes:
          - Resources
      - path: SkillLens/Resources
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.skilllens.app
        PRODUCT_NAME: SkillLens
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_KEY_CFBundleDisplayName: Skill Lens
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.developer-tools
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_APP_SANDBOX: false
        ENABLE_HARDENED_RUNTIME: true
        CODE_SIGNING_ALLOWED: false
    scheme:
      testTargets:
        - SkillLensTests
  SkillLensTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: SkillLensTests
    dependencies:
      - target: SkillLens
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.skilllens.tests
        GENERATE_INFOPLIST_FILE: true
        CODE_SIGNING_ALLOWED: false
