name: SkillLens
options:
  createIntermediateGroups: true
  developmentLanguage: zh-Hans
  deploymentTarget:
    macOS: "14.0"
settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    ENABLE_USER_SCRIPT_SANDBOXING: true
    MARKETING_VERSION: "1.2.1"
    CURRENT_PROJECT_VERSION: "14"
targets:
  SkillLens:
    type: application
    platform: macOS
    productName: Workbench
    sources:
      - path: SkillLens
        excludes:
          - Resources
      - path: SkillLens/Resources
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.skilllens.app
        PRODUCT_NAME: Workbench
        PRODUCT_MODULE_NAME: SkillLens
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_KEY_CFBundleName: Workbench
        INFOPLIST_KEY_CFBundleDisplayName: Workbench
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.developer-tools
        INFOPLIST_KEY_NSHumanReadableCopyright: Copyright © 2026 Workbench contributors. MIT License.
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_APP_SANDBOX: false
        ENABLE_HARDENED_RUNTIME: true
        CODE_SIGN_INJECT_BASE_ENTITLEMENTS: false
        CODE_SIGN_ENTITLEMENTS: SkillLens/SkillLens.entitlements
      configs:
        Debug:
          CODE_SIGNING_ALLOWED: false
    scheme:
      testTargets:
        - SkillLensTests
        - SkillLensUITests
  SkillLensTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: SkillLensTests
    dependencies:
      - target: SkillLens
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.skilllens.tests
        GENERATE_INFOPLIST_FILE: true
        CODE_SIGNING_ALLOWED: false
  SkillLensUITests:
    type: bundle.ui-testing
    platform: macOS
    sources:
      - path: SkillLensUITests
    dependencies:
      - target: SkillLens
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.skilllens.ui-tests
        GENERATE_INFOPLIST_FILE: true
